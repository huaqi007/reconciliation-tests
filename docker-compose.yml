# 一键启动 PostgreSQL（对账索引器数据库）
# docker compose up -d
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer123
      POSTGRES_DB: indexer_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d indexer_db"]
      interval: 2s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
